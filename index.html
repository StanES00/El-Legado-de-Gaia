<script>
/* ====================== CAMBIO PRINCIPAL ====================== */
function showPage(id){
  const pg = document.getElementById('page-' + id);
  if(!pg) return;

  // SCROLL SUAVE (esto es lo que arregla el bug)
  pg.scrollIntoView({ behavior: 'smooth' });

  // Resaltar la pestaña activa
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(function(t){
    if(t.getAttribute('onclick') && t.getAttribute('onclick').indexOf("'"+id+"'") > -1){
      t.classList.add('active');
    }
  });

  // Cargar contenido dinámico (mismo que antes)
  if(id==='comentarios') setTimeout(loadComments, 600);
  if(id==='recomendados') setTimeout(loadRecomendados, 600);
  if(id==='admin'){ 
    setTimeout(loadAdminComments,600); 
    setTimeout(loadAdminBooks,600); 
  }

  // Revelar animaciones después del scroll
  setTimeout(() => {
    pg.querySelectorAll('.reveal').forEach((el,i) => {
      setTimeout(() => el.classList.add('shown'), i*80);
    });
  }, 900);
}

/* Manejo de anclas directas (#page-sinopsis etc.) */
window.addEventListener('load', () => {
  if(location.hash){
    let hash = location.hash.substring(1);
    if(hash.startsWith('page-')) hash = hash.replace('page-','');
    if(document.getElementById('page-'+hash)){
      setTimeout(() => showPage(hash), 400);
    }
  }
});
