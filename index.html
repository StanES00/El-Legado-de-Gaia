<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Legado de Gaia</title>

<style>

body{
margin:0;
background:#0b0f14;
color:white;
font-family:Arial;
text-align:center;
}

.hero{
height:90vh;
background:url("Portada.png") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:60px;
background:rgba(0,0,0,0.6);
padding:20px;
}

section{
padding:60px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.card{
background:#141a22;
padding:15px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:8px;
}

h2{
margin-bottom:40px;
}

</style>

</head>

<body>

<div class="hero">

<h1>EL LEGADO DE GAIA</h1>

</div>

<section>

<h2>Personajes</h2>

<div class="grid">

<div class="card">
<img src="Rio.png">
<h3>Rio</h3>
</div>

<div class="card">
<img src="Amaya.png">
<h3>Amaya</h3>
</div>

<div class="card">
<img src="Rayen.png">
<h3>Rayen</h3>
</div>

<div class="card">
<img src="Draven.jpg">
<h3>Draven</h3>
</div>

<div class="card">
<img src="Reiner.png">
<h3>Reiner</h3>
</div>

<div class="card">
<img src="Rollo.png">
<h3>Rollo</h3>
</div>

</div>

</section>

<section>

<h2>Reinos</h2>

<div class="grid">

<div class="card">
<img src="Valhalla1.jpeg">
</div>

<div class="card">
<img src="Olimpo1.jpeg">
</div>

<div class="card">
<img src="Khamet1.jpeg">
</div>

<div class="card">
<img src="Ciudadela1.jpeg">
</div>

<div class="card">
<img src="Castillostill2.png">
</div>

</div>

</section>

<section>

<h2>Inframundo</h2>

<div class="grid">

<div class="card">
<img src="Inframundo1.jpeg">
</div>

<div class="card">
<img src="Inframundo2.png">
</div>

<div class="card">
<img src="Valledeloscondenados1.jpeg">
</div>

</div>

</section>

<section>

<h2>Facciones</h2>

<div class="grid">

<div class="card">
<img src="Resistencia.jpeg">
<h3>La Resistencia</h3>
</div>

</div>

</section>

</body>

</html>
